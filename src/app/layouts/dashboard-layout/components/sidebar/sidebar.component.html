<aside
  [ngClass]="[
    'fixed inset-y-0 left-0 z-50 flex flex-col border-r border-slate-800 bg-slate-900 text-slate-100 transition-all duration-200',
    'lg:sticky lg:top-0 lg:z-auto lg:translate-x-0 lg:h-screen',
    isOpen ? 'translate-x-0' : '-translate-x-full',
    isCollapsed ? 'w-20' : 'w-72',
  ]"
>
  <!-- Logo -->
  <div class="flex h-16 items-center justify-between border-b border-slate-800 px-6">
    <div class="flex items-center">
      <div
        class="flex h-9 w-9 items-center justify-center rounded-lg bg-indigo-500 text-sm font-bold text-white"
      >
        <tui-icon [icon]="'chart-no-axes-column'" class="text-base"></tui-icon>
      </div>
      <div class="ml-3" [class.hidden]="isCollapsed">
        <p class="text-xl font-semibold tracking-wide">TailAdmin</p>
      </div>
    </div>
    <button type="button" class="text-slate-400 lg:hidden" (click)="close.emit()">
      <tui-icon icon="@tui.x" class="text-base"></tui-icon>
    </button>
  </div>

  <!-- Nav -->
  <div class="flex-1 overflow-y-auto px-4 py-5">
    <p
      class="mb-2 px-3 text-xs font-semibold uppercase tracking-wider text-slate-400"
      [class.hidden]="isCollapsed"
    >
      Menu
    </p>
    <nav class="space-y-1 text-sm">
      @for (group of menu; track group.label) {
        <div>
          <button
            type="button"
            class="flex w-full items-center gap-3 rounded-lg px-3 py-2 text-slate-200 transition hover:bg-slate-800"
            (click)="toggleGroup(group.label)"
          >
            <span class="inline-flex h-7 w-7 items-center justify-center rounded-md bg-slate-800">
              <tui-icon [icon]="group.icon" class="text-base"></tui-icon>
            </span>
            <span class="flex-1 text-left" [class.hidden]="isCollapsed">{{ group.label }}</span>

            @if (group.badge) {
              <span
                class="rounded bg-indigo-500/20 px-1.5 py-0.5 text-[10px] font-semibold text-indigo-300"
                [class.hidden]="isCollapsed"
                >{{ group.badge }}</span
              >
            }
            <tui-icon
              *ngIf="!isCollapsed"
              icon="@tui.chevron-down"
              class="text-base transition"
              [class.rotate-180]="isGroupOpen(group.label)"
              [class.hidden]="isCollapsed"
            ></tui-icon>
          </button>

          <div
            class="overflow-hidden pl-3 transition-[max-height] duration-200"
            [class.hidden]="isCollapsed"
            [style.maxHeight.px]="isGroupOpen(group.label) ? group.children.length * 52 : 0"
          >
            @for (item of group.children; track item.link) {
              <a
                [routerLink]="item.link"
                routerLinkActive="bg-indigo-500/15 text-indigo-200 border-indigo-400"
                [routerLinkActiveOptions]="{ exact: !!item.exact }"
                class="my-1 flex items-center gap-2 rounded-lg border-l-2 border-transparent px-3 py-2 text-slate-300 transition hover:bg-slate-800 hover:text-white"
                (click)="close.emit()"
              >
                <tui-icon [icon]="item.icon" class="text-sm"></tui-icon>
                {{ item.label }}
              </a>
            }
          </div>
        </div>
      }
    </nav>
  </div>

  <!-- Logout -->
  <div class="border-t border-slate-800 p-4" [class.hidden]="isCollapsed">
    <button
      class="flex w-full items-center justify-center gap-2 rounded-lg border border-slate-700 px-3 py-2 text-sm font-medium text-slate-200 transition hover:bg-slate-800"
    >
      <tui-icon icon="@tui.log-out" class="text-sm"></tui-icon>
      Đăng xuất
    </button>
  </div>
</aside>
